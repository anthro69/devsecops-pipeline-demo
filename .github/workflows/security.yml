name: Security Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  bandit-sast:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r app/ -f json -o bandit-report.json || true

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v3
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Print Bandit Summary
        run: bandit -r app/ -ll || true

  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v3

      - name: Run Semgrep
        run: semgrep --config=auto --json --output=semgrep-report.json app/ || true

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v3
        with:
          name: semgrep-report
          path: semgrep-report.json

      - name: Print Semgrep Summary
        run: semgrep --config=auto app/ || true

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Safety
        run: pip install safety

      - name: Run Safety Check
        run: safety check -r requirements.txt --json --output safety-report.json || true

      - name: Upload Safety Report
        uses: actions/upload-artifact@v3
        with:
          name: safety-report
          path: safety-report.json

      - name: Print Safety Summary
        run: safety check -r requirements.txt || true

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [bandit-sast, semgrep-sast, dependency-check]
    steps:
      - name: Print Summary
        run: |
          echo "## Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit SAST | Done |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep SAST | Done |" >> $GITHUB_STEP_SUMMARY
          echo "| Safety Dependency Check | Done |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check artifacts for full reports." >> $GITHUB_STEP_SUMMARY