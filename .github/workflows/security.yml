name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   

jobs:
  bandit:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Full report (all severities, non-blocking)
        run: bandit -r app/ -f sarif -o bandit-results.sarif
        continue-on-error: true

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload Bandit report artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-results.sarif

      - name: Quality gate — fail on HIGH severity
        run: bandit -r app/ -lll   
  semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Full report (all severities, non-blocking)
        run: semgrep scan --config auto --sarif --output semgrep-results.sarif app/
        continue-on-error: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep report artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-results.sarif

      - name: Quality gate — fail on ERROR severity
        run: semgrep scan --config auto --severity ERROR --error app/
  safety:
    name: Dependency Scan - Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Safety
        run: pip install safety

      - name: Run Safety check
        run: safety check -r requirements.txt --full-report
        continue-on-error: true

  pip-audit:
    name: Dependency Scan - pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt -f json -o pip-audit-report.json
        continue-on-error: true

      - name: Upload pip-audit report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  gate:
    name: Security Gate
    needs: [bandit, semgrep, safety, pip-audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check critical SAST results
        run: |
          if [ "${{ needs.bandit.result }}" != "success" ] || [ "${{ needs.semgrep.result }}" != "success" ]; then
            echo "Critical SAST findings (HIGH/ERROR severity) — merge заблоковано."
            exit 1
          fi
          echo "Жодних critical SAST-знахідок. Dependency-звіти (Safety, pip-audit) — дивись у Security tab та артефактах."
